  <body>
    <div id="error-log" style="color: red; background: white; z-index: 9999; position: absolute;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').innerHTML += `<p>${message} at ${source}:${lineno}:${colno}</p>`;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-log').innerHTML += `<p>Promise Rejection: ${event.reason}</p>`;
      };
    </script>
    <div id="root"></div>
  </body>
